name: Migration Check

on:
  pull_request:
    paths:
      - 'db/migrations/**'
      - 'apps/api/scripts/migrate.js'

jobs:
  migrate:
    name: Validate migrations against fresh DB
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install pg dependency
        run: npm install --no-save pg

      - name: Run migrations (full sequence)
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
        run: node apps/api/scripts/migrate.js

      - name: Run migrations again (idempotency check)
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
        run: node apps/api/scripts/migrate.js
