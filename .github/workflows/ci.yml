name: ci

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: luizianne
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/luizianne
      REDIS_URL: redis://localhost:6379
      ADMIN_TOKEN: ci-token
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build API
        run: npm run build --workspace=@luizianne/api

      - name: Run API unit tests
        run: npm run test --workspace=@luizianne/api -- --passWithNoTests

      - name: Run DB migrations
        run: npm run db:migrate --workspace=@luizianne/api

      - name: Build Web
        run: npm run build --workspace=@luizianne/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
